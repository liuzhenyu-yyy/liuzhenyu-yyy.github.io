- name: Sequential and Distinct Roles of Ngn3 and Neurod1 in Pancreatic Lineage Differentiation
  image: https://i.bmp.ovh/imgs/2021/01/710ce266cb9dd75f.png
  link:
  description: Cell identities are established through the sequential action of key transcription factors (TFs). The current model of pancreas endocrine lineage differentiation invokes the transient expression of basic helix-loop-helix (bHLH) transcription factor Neurogenin 3 (Ngn3) in the trunk cells as the trigger of endocrine fate commitment and rapid differentiation to pro-islet cells. Another bHLH transcription factor named Neurod1, which is directly regulated by Ngn3, also plays critical roles in the pancreatic endocrine specification. Despite the key regulatory function of these two TFs, their genomic targets and the regulatory mechanism remains largely unknown. Here, we had generated a new transgenic mouse strain to uncover the genome-wide direct target of Ngn3 with the CUT&RUN method and performed comprehensive investigations of the sequential and distinct chromatin regulatory program mediated by Ngn3 and Neurod1. We found that Ngn3 access genome enhancers in highly condensed chromatin regions and prompt their activation. The enhancer landscape established by Ngn3 is further maintained by the expression of Neurod1. Neurod1 also binds the promoter region of key endocrine TFs to help initiate their expression. These data suggest the pioneering ability of Ngn3, with Neurod1 acting as a co-factor to maintain the opened chromatin state. 