# WhatATheme
markdown: kramdown

# URL of the Site
url: ''
# Base URL of the Site (i.e., Name of the Repository in which the Site is hosted)
baseurl: 

# Title of the Site
title: Liu Zhenyu
# Description of the Site
description: Keep calm and carry on. 
# URL of Image of the Site
site-image: /WhatATheme/assets/images/meta.jpg
# Keywords of the Site
site-keywords: Site, Template, Theme
# URL for the Image of custom Favicon
favicon-url: https://ftp.bmp.ovh/imgs/2020/12/1daba17f9c5448e7.jpg

# URL of the Image of Custom Hero Image (i.e., the image in the background of the very first section of the Homepage)
heroimage: https://w.wallhaven.cc/full/rd/wallhaven-rd7drw.jpg

# Social Media and Contact
# If you don't want to use any icon, you can leave them blank.
email: liuzhenyu@pku.edu.cn
facebook_username: 
twitter_username: _LiuZhenyu
instagram_username:
linkedin_username:
github_username: liuzhenyu-yyy
youtube_channel_id:
reddit_username:
behance_username:
dribbble_username:
spotify_username:

# Google Analytics
google-analytics: G-PLDYFPQDMQ

# Disqus
disqus-shortname: thedevslot

# Name of the Author
author-name: Zhenyu Liu
# URL for the Image of the Author
author-image: https://ftp.bmp.ovh/imgs/2020/12/1daba17f9c5448e7.jpg
# 60 Words About the Author
author-about: Graduate student at BIOPIC, Peking University. Majoring in Cell biology and bioinformatics with a special focus on single cell genomics and cancer biology.
# URL to the Author's Profile (i.e., Github, Twitter, Stackoverflow, etc)
author-url: https://liuzhenyu-yyy.github.io/

# SASS
sass:
  sass_dir: _sass
  style: compressed

# Build settings
plugins:
  - jekyll-admin
  - jekyll-feed

# Permalink
permalink: "blog/:title"

# Compress
compress_html:
  clippings: all

# Defaults
defaults:
  -
    scope:
      type: 'posts'
    values:
      layout: post
      post-image: ""
      description: ""
      tags:
        - ""
  -
    scope:
      type: 'pages'
    values:
      layout: page

# Exclude
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
